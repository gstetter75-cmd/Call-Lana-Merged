<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="description" content="Call Lana – Neues Passwort setzen.">
<title>Passwort zurücksetzen – Call Lana</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/marketing.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:linear-gradient(160deg,#f5f3ff 0%,#ede9fe 40%,#fafafa 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 5%;height:72px;display:flex;align-items:center;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.reset-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:44px 48px;width:100%;max-width:440px;position:relative;z-index:2;box-shadow:var(--shadow-xl);}
.reset-card .logo{margin-bottom:36px;justify-content:center;}
h1{font-size:1.7rem;font-weight:900;text-align:center;margin-bottom:6px;color:var(--tx);letter-spacing:-.02em;}
.sub{text-align:center;color:var(--tx2);font-size:.9rem;margin-bottom:32px;}
.fgrp{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.fgrp label{font-size:11.5px;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;}
.finp{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--tx);font-size:14.5px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;width:100%;}
.finp::placeholder{color:var(--tx4);}
.finp:focus{border-color:var(--pu);background:var(--white);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.finp.err{border-color:var(--red);}
.err-msg{font-size:11.5px;color:var(--red);min-height:14px;display:block;}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;transition:color .2s;}
.pw-toggle:hover{color:var(--pu);}
.pw-strength{display:flex;gap:4px;margin-top:8px;}.pw-bar{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s;}.pw-bar.w{background:var(--red);}.pw-bar.m{background:#f59e0b;}.pw-bar.s{background:var(--green);}
.pw-label{font-size:11px;color:var(--tx3);margin-top:5px;}
.submit-btn{width:100%;background:var(--pu);border:none;border-radius:12px;padding:14px;color:white;font-weight:700;font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 4px 14px rgba(124,58,237,.35);margin-top:4px;}
.submit-btn:hover{background:var(--pu2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.alert-box{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none;}
.alert-box.error{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);color:var(--red);}
.alert-box.success{background:var(--green-light);border:1px solid rgba(5,150,105,.2);color:var(--green);}
.alert-box.info{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.2);color:#0891b2;}
.back-link{display:block;text-align:center;margin-top:20px;color:var(--tx3);font-size:13px;text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--pu);}
@media(max-width:500px){.reset-card{padding:32px 28px;}body{padding:16px;}}
</style>
</head>
<body>

<div class="login-nav">
  <a href="index.html" class="logo"><picture><source srcset="logo-nav.webp" type="image/webp"><img src="logo-nav.png" alt="Call Lana" height="40"></picture></a>
</div>

<div class="reset-card">
  <a href="index.html" class="logo"><picture><source srcset="logo-nav.webp" type="image/webp"><img src="logo-nav.png" alt="Call Lana" height="40"></picture></a>

  <h1>Neues Passwort setzen</h1>
  <p class="sub">Gib dein neues Passwort ein. Mindestens 8 Zeichen.</p>

  <div class="alert-box" id="alertBox"></div>

  <form id="resetForm" novalidate>
    <div class="fgrp">
      <label for="pw">Neues Passwort</label>
      <div class="pw-wrap">
        <input type="password" id="pw" class="finp" placeholder="Mindestens 8 Zeichen" autocomplete="new-password" required aria-describedby="pw-err">
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Passwort anzeigen">👁</button>
      </div>
      <div class="pw-strength"><div class="pw-bar" id="pb1"></div><div class="pw-bar" id="pb2"></div><div class="pw-bar" id="pb3"></div><div class="pw-bar" id="pb4"></div></div>
      <span class="pw-label" id="pwLabel">Passwortstärke</span>
      <span class="err-msg" id="pw-err" role="alert"></span>
    </div>

    <div class="fgrp">
      <label for="pw2">Passwort bestätigen</label>
      <input type="password" id="pw2" class="finp" placeholder="Passwort wiederholen" autocomplete="new-password" required aria-describedby="pw2-err">
      <span class="err-msg" id="pw2-err" role="alert"></span>
    </div>

    <button type="submit" class="submit-btn" id="subBtn">Passwort speichern</button>
  </form>

  <a href="login.html" class="back-link">← Zurück zum Login</a>
</div>

<script src="js/logger.js"></script>
<script src="js/supabase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script>
// Password strength indicator
const pw = document.getElementById('pw');
const bars = ['pb1','pb2','pb3','pb4'].map(id => document.getElementById(id));
const labels = ['Zu kurz', 'Schwach', 'Mittel', 'Stark'];

pw.addEventListener('input', () => {
  const v = pw.value;
  let s = 0;
  if (v.length >= 8) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  bars.forEach((b, i) => {
    b.className = 'pw-bar';
    if (i < s) b.classList.add(s <= 1 ? 'w' : s <= 2 ? 'm' : 's');
  });
  document.getElementById('pwLabel').textContent = 'Passwortstärke: ' + (labels[s] || 'Zu kurz');
});

// Password toggle
document.getElementById('pwToggle').addEventListener('click', () => {
  pw.type = pw.type === 'password' ? 'text' : 'password';
  document.getElementById('pwToggle').textContent = pw.type === 'password' ? '👁' : '🙈';
});

// Check if we have a valid session from the reset link
(async () => {
  const user = await clanaAuth.getUser();
  if (!user) {
    showAlert('Ungültiger oder abgelaufener Reset-Link. Bitte fordere einen neuen an.', 'error');
    document.getElementById('resetForm').style.display = 'none';
  }
})();

// Form submit
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.querySelectorAll('.err-msg').forEach(el => el.textContent = '');
  document.querySelectorAll('.finp').forEach(el => el.classList.remove('err'));

  const password = pw.value;
  const pw2Val = document.getElementById('pw2').value;
  let valid = true;

  if (!password) {
    showError('pw', 'Passwort ist erforderlich.');
    valid = false;
  } else if (password.length < 8) {
    showError('pw', 'Passwort muss mindestens 8 Zeichen haben.');
    valid = false;
  }

  if (password !== pw2Val) {
    showError('pw2', 'Passwörter stimmen nicht überein.');
    valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById('subBtn');
  btn.disabled = true;
  btn.textContent = 'Wird gespeichert...';

  try {
    const { data, error } = await supabaseClient.auth.updateUser({ password });

    if (error) {
      showAlert('Fehler: ' + error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Passwort speichern';
      return;
    }

    showAlert('Passwort erfolgreich geändert! Weiterleitung zum Login...', 'success');
    document.getElementById('resetForm').style.display = 'none';

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
  } catch (err) {
    showAlert('Ein unerwarteter Fehler ist aufgetreten. Bitte versuche es erneut.', 'error');
    btn.disabled = false;
    btn.textContent = 'Passwort speichern';
  }
});

function showError(fieldId, message) {
  const field = document.getElementById(fieldId);
  field.classList.add('err');
  document.getElementById(fieldId + '-err').textContent = message;
}

function showAlert(message, type) {
  const box = document.getElementById('alertBox');
  box.textContent = message;
  box.className = 'alert-box ' + type;
  box.style.display = 'block';
}
</script>
<script src="cookie-consent.js"></script>
</body>
</html>
