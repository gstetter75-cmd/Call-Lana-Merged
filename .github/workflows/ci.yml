name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node build.js
      - name: Check bundle size
        run: |
          SIZE=$(find dist/ -name '*.js' ! -name '*.map' -exec cat {} + | wc -c)
          SIZE_KB=$((SIZE / 1024))
          echo "JS bundle size (without sourcemaps): ${SIZE_KB} KB"
          if [ $SIZE_KB -gt 600 ]; then
            echo "::error::Bundle size ${SIZE_KB} KB exceeds 600 KB limit"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npx vitest run
      - name: Check test count
        run: |
          COUNT=$(npx vitest run 2>&1 | grep -o '[0-9]* passed' | head -1 | grep -o '[0-9]*')
          echo "Tests passed: $COUNT"
          if [ "$COUNT" -lt 800 ]; then
            echo "::warning::Test count dropped below 800 (was 813)"
          fi

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Check for vulnerabilities
        run: npm audit --audit-level=high || true
      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk_live_\|sk_test_\|AKIA[0-9A-Z]\{16\}" js/ supabase/functions/ --include="*.js" --include="*.ts" | grep -v node_modules | grep -v ".test."; then
            echo "::error::Potential hardcoded secrets found"
            exit 1
          fi

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Start local server
        run: npx http-server -p 8080 -s &
      - name: Wait for server
        run: sleep 2
      - name: Run smoke tests
        run: node scripts/smoke-test.js

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npx playwright test tests/e2e/critical-flows.spec.ts tests/e2e/auth.spec.ts tests/e2e/sales-flow.spec.ts tests/e2e/404.spec.ts tests/e2e/blog.spec.ts tests/e2e/cookie-consent.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  health-check:
    name: Health Check (Production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [unit-tests, build, smoke-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Wait for Netlify deploy
        run: sleep 60
      - name: Run health check
        run: node scripts/health-check.js
      - name: Run smoke test against production
        run: node scripts/smoke-test.js --remote
