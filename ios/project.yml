name: CallLana
options:
  bundleIdPrefix: de.call-lana
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: "Call Lana"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
    INFOPLIST_KEY_NSFaceIDUsageDescription: "Face ID für sichere Anmeldung verwenden"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  CallLana:
    type: application
    platform: iOS
    sources:
      - path: CallLana
        excludes:
          - "Package.swift"
          - "Tests/**"
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.call-lana.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  CallLanaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CallLana/Tests/UnitTests
    dependencies:
      - target: CallLana
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.call-lana.app.tests
