<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Call Lana Login – Melde dich in deinem Dashboard an.">
<meta property="og:title" content="Bestandskunden Login – Call Lana">
<meta property="og:description" content="Call Lana Login – Melde dich in deinem Dashboard an.">
<meta property="og:type" content="website">
<meta property="og:locale" content="de_DE">
<link rel="canonical" href="https://call-lana.de/login">
<title>Bestandskunden Login – Call Lana</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/marketing.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:linear-gradient(160deg,#f5f3ff 0%,#ede9fe 40%,#fafafa 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

/* Minimal nav for login */
.login-nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:0 5%;height:72px;display:flex;align-items:center;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}

.login-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:44px 48px;width:100%;max-width:440px;position:relative;z-index:2;box-shadow:var(--shadow-xl);}
.login-card .logo{margin-bottom:36px;justify-content:center;}

.badge{display:inline-block;background:var(--green-light);border:1px solid rgba(5,150,105,.2);color:var(--green);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:20px;letter-spacing:.06em;}

h1{font-size:1.7rem;font-weight:900;text-align:center;margin-bottom:6px;color:var(--tx);letter-spacing:-.02em;}
.sub{text-align:center;color:var(--tx2);font-size:.9rem;margin-bottom:32px;}
.sub a{color:var(--pu);text-decoration:none;font-weight:600;}.sub a:hover{text-decoration:underline;}

.fgrp{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.fgrp label{font-size:11.5px;font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;}
.finp{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--tx);font-size:14.5px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;width:100%;}
.finp::placeholder{color:var(--tx4);}
.finp:focus{border-color:var(--pu);background:var(--white);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.finp.err{border-color:var(--red);}
.err-msg{font-size:11.5px;color:var(--red);min-height:14px;display:block;}

.row-between{display:flex;justify-content:space-between;align-items:center;margin-top:-8px;margin-bottom:14px;}
.remember{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--tx3);cursor:pointer;}
.remember input{width:16px;height:16px;cursor:pointer;accent-color:var(--pu);}
.forgot{font-size:12.5px;color:var(--tx3);cursor:pointer;transition:color .2s;text-decoration:none;}
.forgot:hover{color:var(--pu);}

.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);font-size:13px;transition:color .2s;}
.pw-toggle:hover{color:var(--pu);}

.submit-btn{width:100%;background:var(--pu);border:none;border-radius:12px;padding:14px;color:white;font-weight:700;font-size:15px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .25s;box-shadow:0 4px 14px rgba(124,58,237,.35);margin-top:4px;}
.submit-btn:hover{background:var(--pu2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.trust-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.ti{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--tx3);}

.alert-box{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none;}
.alert-box.error{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);color:var(--red);}
.alert-box.success{background:var(--green-light);border:1px solid rgba(5,150,105,.2);color:var(--green);}
.alert-box.info{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.2);color:#0891b2;}

.loader{display:none;text-align:center;padding:20px;}
.loader-spinner{border:3px solid var(--border);border-top:3px solid var(--pu);border-radius:50%;width:32px;height:32px;animation:spin 1s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

.quick-links{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:20px;}
.quick-links h3{font-size:12px;font-weight:700;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
.quick-links ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.quick-links a{color:var(--tx2);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:8px;transition:color .2s;}
.quick-links a:hover{color:var(--pu);}
.quick-links a::before{content:'→';color:var(--pu);}

@media(max-width:500px){
  .login-card{padding:32px 28px;}
  body{padding:16px;}
}
</style>
</head>
<body>

<div class="login-nav">
  <a href="index.html" class="logo"><picture><source srcset="logo-nav.webp" type="image/webp"><img src="logo-nav.png" alt="Call Lana" height="40"></picture></a>
</div>

<div class="login-card">
  <a href="index.html" class="logo"><picture><source srcset="logo-nav.webp" type="image/webp"><img src="logo-nav.png" alt="Call Lana" height="40"></picture></a>

  <div style="text-align:center;">
    <span class="badge">🔐 Bestandskunden-Login</span>
  </div>

  <h1>Willkommen zurück</h1>
  <p class="sub">Noch kein Konto? <a href="registrierung.html">Jetzt kostenlos registrieren →</a></p>

  <div class="alert-box" id="alertBox"></div>
  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <p style="margin-top:12px;font-size:13px;color:var(--tx3);">Anmeldung läuft...</p>
  </div>

  <form id="loginForm" novalidate>
    <div class="fgrp">
      <label for="em">E-Mail-Adresse</label>
      <input
        type="email"
        id="em"
        name="email"
        class="finp"
        placeholder="max@unternehmen.de"
        autocomplete="email"
        required
        aria-describedby="em-err"
      >
      <span class="err-msg" id="em-err" role="alert"></span>
    </div>

    <div class="fgrp">
      <label for="pw">Passwort</label>
      <div class="pw-wrap">
        <input
          type="password"
          id="pw"
          name="password"
          class="finp"
          placeholder="Dein Passwort"
          autocomplete="current-password"
          required
          aria-describedby="pw-err"
        >
        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Passwort anzeigen">👁</button>
      </div>
      <span class="err-msg" id="pw-err" role="alert"></span>
    </div>

    <div class="row-between">
      <label class="remember">
        <input type="checkbox" id="rememberMe">
        <span>Angemeldet bleiben</span>
      </label>
      <a href="#" class="forgot" id="forgotBtn">Passwort vergessen?</a>
    </div>

    <button type="submit" class="submit-btn" id="subBtn">Zum Dashboard →</button>
  </form>

  <div class="trust-row">
    <div class="ti">🔒 256-Bit SSL</div>
    <div class="ti">🇩🇪 DSGVO</div>
    <div class="ti">⭐ 4,8★ Trustpilot</div>
  </div>

  <div class="quick-links">
    <h3>Schnellzugriff</h3>
    <ul>
      <li><a href="dashboard.html">Zum Dashboard</a></li>
      <li><a href="kontakt.html">Support kontaktieren</a></li>
      <li><a href="preise.html">Preise & Pakete</a></li>
      <li><a href="datenschutz.html">Datenschutz</a></li>
    </ul>
  </div>
</div>

<script src="supabase-config.js"></script>
<script src="js/auth-guard.js"></script>
<script>
// ==========================================
// GLOBAL STATE
// ==========================================
let loginAttempts = 0;
const MAX_ATTEMPTS = 5;

// ==========================================
// ROLE-BASED REDIRECT
// ==========================================
async function redirectByRole() {
  try {
    const profile = await AuthGuard.getProfile();
    if (profile && profile.role) {
      const home = AuthGuard.ROLE_HOME[profile.role] || 'dashboard.html';
      window.location.href = home;
      return;
    }
  } catch (err) {
    console.error('Redirect by role failed:', err);
  }
  // Fallback: always go to dashboard — AuthGuard.init() handles session
  window.location.href = 'dashboard.html';
}

// ==========================================
// CHECK IF ALREADY LOGGED IN
// ==========================================
(async () => {
  const session = await clanaAuth.getSession();
  if (session) {
    showAlert('Du bist bereits eingeloggt. Weiterleitung...', 'info');
    setTimeout(async () => {
      await redirectByRole();
    }, 500);
  }

  // Check for "Remember Me"
  const rememberedEmail = localStorage.getItem('calllana_remember_email');
  if (rememberedEmail) {
    document.getElementById('em').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
  }
})();

// ==========================================
// PASSWORD TOGGLE
// ==========================================
document.getElementById('pwToggle').addEventListener('click', () => {
  const pw = document.getElementById('pw');
  const btn = document.getElementById('pwToggle');

  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = '🙈';
    btn.setAttribute('aria-label', 'Passwort verbergen');
  } else {
    pw.type = 'password';
    btn.textContent = '👁';
    btn.setAttribute('aria-label', 'Passwort anzeigen');
  }
});

// ==========================================
// FORGOT PASSWORD
// ==========================================
document.getElementById('forgotBtn').addEventListener('click', async (e) => {
  e.preventDefault();

  const email = document.getElementById('em').value.trim();

  if (!email) {
    showAlert('Bitte gib deine E-Mail-Adresse ein, um das Passwort zurückzusetzen.', 'error');
    document.getElementById('em').focus();
    return;
  }

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showAlert('Bitte gib eine gültige E-Mail-Adresse ein.', 'error');
    return;
  }

  showAlert('Passwort-Reset-Link wird gesendet...', 'info');

  const result = await clanaAuth.resetPassword(email);

  if (result.success) {
    showAlert('✓ Passwort-Reset-Link wurde an ' + email + ' gesendet! Prüfe dein Postfach.', 'success');
  } else {
    showAlert('Fehler beim Senden des Reset-Links: ' + result.error, 'error');
  }
});

// ==========================================
// FORM SUBMIT
// ==========================================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  if (loginAttempts >= MAX_ATTEMPTS) {
    showAlert('Zu viele Login-Versuche. Bitte warte 5 Minuten.', 'error');
    return;
  }

  document.querySelectorAll('.err-msg').forEach(el => el.textContent = '');
  document.querySelectorAll('.finp').forEach(el => el.classList.remove('err'));
  hideAlert();

  const email = document.getElementById('em').value.trim();
  const password = document.getElementById('pw').value;
  const rememberMe = document.getElementById('rememberMe').checked;

  let valid = true;

  if (!email) {
    showError('em', 'E-Mail ist erforderlich.');
    valid = false;
  } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showError('em', 'Ungültige E-Mail-Adresse.');
    valid = false;
  }

  if (!password) {
    showError('pw', 'Passwort ist erforderlich.');
    valid = false;
  } else if (password.length < 6) {
    showError('pw', 'Passwort zu kurz (mind. 6 Zeichen).');
    valid = false;
  }

  if (!valid) return;

  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('loader').style.display = 'block';

  const result = await clanaAuth.signIn(email, password);

  if (result.success) {
    if (rememberMe) {
      localStorage.setItem('calllana_remember_email', email);
    } else {
      localStorage.removeItem('calllana_remember_email');
    }

    loginAttempts = 0;
    showAlert('✓ Login erfolgreich! Weiterleitung...', 'success');

    setTimeout(async () => {
      await redirectByRole();
    }, 1000);

  } else {
    loginAttempts++;

    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('loader').style.display = 'none';

    let errorMsg = 'Login fehlgeschlagen. ';

    if (result.error.includes('Invalid login')) {
      errorMsg += 'E-Mail oder Passwort falsch.';
    } else if (result.error.includes('Email not confirmed')) {
      errorMsg += 'Bitte bestätige zuerst deine E-Mail-Adresse.';
    } else {
      errorMsg += result.error;
    }

    if (loginAttempts >= MAX_ATTEMPTS - 1) {
      errorMsg += ` (Noch ${MAX_ATTEMPTS - loginAttempts} Versuch übrig)`;
    }

    showAlert(errorMsg, 'error');
  }
});

function showError(fieldId, message) {
  const field = document.getElementById(fieldId);
  field.classList.add('err');
  document.getElementById(fieldId + '-err').textContent = message;
  field.focus();
}

function showAlert(message, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = message;
  box.className = 'alert-box ' + type;
  box.style.display = 'block';

  if (type === 'success' || type === 'info') {
    setTimeout(() => hideAlert(), 5000);
  }
}

function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('em').focus();
  }
});

if (loginAttempts > 0) {
  setTimeout(() => {
    loginAttempts = 0;
  }, 5 * 60 * 1000);
}
</script>
<script src="cookie-consent.js"></script>
</body>
</html>
